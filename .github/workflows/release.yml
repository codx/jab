name: Release

on:
  push:
    tags: ['v*']

# Default deny — each job opts into the minimum it needs.
permissions: {}

jobs:
  build:
    # Skip on forks/mirrors — release artifacts only come from the canonical repo.
    if: github.repository_owner == 'codx'
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - x86_64-macos
          - aarch64-macos
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # need full history for SOURCE_DATE_EPOCH

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Read version from build.zig.zon
        id: ver
        run: |
          v=$(sed -nE 's/.*\.version = "([^"]+)".*/\1/p' build.zig.zon)
          test -n "$v" || { echo "could not parse version from build.zig.zon"; exit 1; }
          tag="${GITHUB_REF_NAME#v}"
          test "$v" = "$tag" || { echo "build.zig.zon version ($v) != tag ($tag)"; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # parser.c is generated, not committed — materialize from pinned inputs.
      - name: Materialize grammars
        run: make grammars

      - name: Cross-compile
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          nix develop --command \
            zig build -Dtarget="$TARGET" --release=safe -Dstrip=true

      - name: Package
        id: pkg
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euxo pipefail
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          asset="jab-${VERSION}-${TARGET}.tar.gz"
          tar --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" --format=ustar \
              -cf - -C zig-out/bin jab \
            | gzip -n -9 > "${asset}"
          sha256sum "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: ${{ steps.pkg.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

  publish:
    if: github.repository_owner == 'codx'
    name: Sign, attest, upload
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write       # upload to the GH Release
      id-token: write       # cosign keyless OIDC + attestations
      attestations: write   # store build-provenance attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -euxo pipefail
          ls -la
          sha256sum jab-* > SHA256SUMS
          cat SHA256SUMS

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SHA256SUMS (keyless OIDC)
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --bundle SHA256SUMS.sigstore.json \
            SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/jab-*.tar.gz'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/jab-*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json
          generate_release_notes: true
          fail_on_unmatched_files: true
